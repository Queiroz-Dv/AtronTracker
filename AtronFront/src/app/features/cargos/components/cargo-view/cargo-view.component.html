<mat-card class="container p-10">
  <mat-card-content>
    <div class="actions m-10">
      <button mat-raised-button color="primary" (click)="router.navigate(['atron/cargos/novo'])">
        Novo Cargo
      </button>
    </div>

    <mat-form-field>
      <mat-label>Filtrar</mat-label>
      <input matInput (keyup)="applyFilter($event)" #input>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Código</th>
        <td mat-cell *matCellDef="let crg">{{ crg.codigo }}</td>
      </ng-container>

      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Descrição</th>
        <td mat-cell *matCellDef="let crg">{{ crg.descricao }}</td>
      </ng-container>

      <ng-container matColumnDef="departamento">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Departamento</th>
        <td mat-cell *matCellDef="let crg">
          {{ crg.departamentoCodigo + ' - ' + crg.departamentoDescricao }}
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let crg">
          <mat-card-actions>
            <button mat-icon-button color="primary" (click)="editar(crg.codigo)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="excluir(crg.codigo)">
              <mat-icon>delete</mat-icon>
            </button>
          </mat-card-actions>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Selecione a página de cargos">
    </mat-paginator>

    <mat-card-actions class="m-10">
      <c-botao-voltar></c-botao-voltar>
    </mat-card-actions>
  </mat-card-content>
</mat-card>
