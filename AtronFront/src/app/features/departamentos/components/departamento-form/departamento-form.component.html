<div [formGroup]="form" class="container centered-container">
  <h2>Cadastro de departamentos</h2>
  <mat-form-field>
    <mat-label>Código</mat-label>
    <input matInput formControlName="codigo" [maxlength]="10" />
    <c-control-error [control]="form.get('codigo')"></c-control-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Descrição</mat-label>
    <input matInput formControlName="descricao" />
    <c-control-error [control]="form.get('descricao')"></c-control-error>
  </mat-form-field>
</div>
