<div [formGroup]="usuarioForm" class="container centered-container m-10">
  <mat-form-field>
    <mat-label>Código</mat-label>
    <input matInput formControlName="codigo" />
    <c-control-error [control]="usuarioForm.get('codigo')"></c-control-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Nome</mat-label>
    <input matInput formControlName="nome" />
    <c-control-error [control]="usuarioForm.get('nome')"></c-control-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Sobrenome</mat-label>
    <input matInput formControlName="sobrenome" />
    <c-control-error [control]="usuarioForm.get('sobrenome')"></c-control-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Data de Nascimento</mat-label>
    <input matInput appDateMask placeholder="dd/MM/yyyy" formControlName="dataNascimento" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Salário</mat-label>
    <input matInput type="number" formControlName="salario" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" />
    <c-control-error [control]="usuarioForm.get('email')"></c-control-error>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Senha</mat-label>
    <input matInput type="password" formControlName="senha" />
    <c-control-error [control]="usuarioForm.get('senha')"></c-control-error>
  </mat-form-field>

  <!-- Select de Departamento (controlado pelos cargos) -->
  <mat-form-field>
    <mat-label>Departamento</mat-label>
    <input type="text" matInput [formControl]="departamentoControl" [matAutocomplete]="autoDep" />
    <c-control-error [control]="usuarioForm.get('departamentoCodigo')"></c-control-error>
    <mat-autocomplete #autoDep="matAutocomplete" [displayWith]="exibirDepartamentoDescricao">
      @for (dep of departamentosFiltrados; track dep.codigo) {
      <mat-option [value]="dep">{{ dep.descricao }}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  <!-- Select de Cargo (controlado pelos departamentos) -->
  <mat-form-field>
    <mat-label>Cargo</mat-label>
    <input type="text" matInput [formControl]="cargoControl" [matAutocomplete]="autoCrg" />
    <c-control-error [control]="usuarioForm.get('cargoCodigo')"></c-control-error>
    <mat-autocomplete #autoCrg="matAutocomplete" [displayWith]="exibirCargoDescricao">
      @for (crg of cargosFiltrados; track crg.codigo) {
      <mat-option [value]="crg">{{ crg.descricao }}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>
</div>
