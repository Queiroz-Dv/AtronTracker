<mat-card class="container p-10">
  <mat-card-content>
    <div class="actions m-10">
      <button mat-raised-button color="primary" (click)="router.navigate(['atron/usuarios/novo'])">
        Novo usuário
      </button>
    </div>

    <mat-form-field>
      <mat-label>Filtrar</mat-label>
      <input matInput (keyup)="applyFilter($event)" #input>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="">Usuário</th>
        <td mat-cell *matCellDef="let usr">{{ usr.codigo }}</td>
      </ng-container>

      <ng-container matColumnDef="cargo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="">Cargo</th>
        <td mat-cell *matCellDef="let usr">
          {{ usr.cargo }}
        </td>
      </ng-container>

      <ng-container matColumnDef="departamento">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="">Departamento</th>
        <td mat-cell *matCellDef="let usr">
          {{ usr.departamento }}
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let usr">
          <mat-card-actions>
            <button mat-icon-button color="primary" (click)="editar(usr.codigoOriginal)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="excluir(usr.codigoOriginal)">
              <mat-icon>delete</mat-icon>
            </button>
          </mat-card-actions>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Selecione a página de usuários">
    </mat-paginator>

    <mat-card-actions class="m-10">
      <c-botao-voltar></c-botao-voltar>
    </mat-card-actions>
  </mat-card-content>
</mat-card>
