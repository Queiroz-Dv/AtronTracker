<mat-card class="container p-10">
  <mat-card-content>
    <div class="actions m-10">
      <button mat-raised-button (click)="router.navigate(['atron/perfil-de-acesso/novo'])">
        Criar novo perfil
      </button>
    </div>

    <table mat-table class="mat-elevation-z2" matSort aria-label="Elements">
      <!-- Id Column -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Código do perfil</th>
        <td mat-cell *matCellDef="let row">{{row.codigo}}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="descricao">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Descrição</th>
        <td mat-cell *matCellDef="let row">{{row.descricao}}</td>
      </ng-container>

      <!-- Quantidade de módulos Column -->
      <ng-container matColumnDef="quantidadeDeModulos">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Quantidade de Módulos</th>
        <td mat-cell *matCellDef="let row">{{row.quantidadeDeModulos}}</td>
      </ng-container>


      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let row">
          <mat-card-actions>
            <button mat-icon-button (click)="editar(row.codigo)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button (click)="excluir(row.codigo)">
              <mat-icon>delete</mat-icon>
            </button>
          </mat-card-actions>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator #paginator [length]="dataSource.data.length" [pageIndex]="0" [pageSize]="10"
      [pageSizeOptions]="[5, 10, 20]" aria-label="Select page">
    </mat-paginator>
    <mat-card-actions class="m-10">
      <c-botao-voltar></c-botao-voltar>
    </mat-card-actions>
  </mat-card-content>
</mat-card>
