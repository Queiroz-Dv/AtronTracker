<div [formGroup]="form" class="container perfil-form">
  <fieldset class="perfil-fieldset">
    <legend>Perfil de acesso</legend>
    <mat-form-field appearance="fill" class="perfil-codigo-input">
      <mat-label>Código</mat-label>
      <input matInput formControlName="codigo" />
    </mat-form-field>
    <mat-form-field class="perfil-descricao-input" appearance="fill">
      <mat-label>Descrição</mat-label>
      <input matInput formControlName="descricao" />
    </mat-form-field>

    <fieldset class="modulo-fieldset">
      <legend>Módulos</legend>
      <!-- tabela de módulos -->
      <table mat-table [dataSource]="dataSource" multiTemplateDataRows class="mat-elevation-z8">
        <!-- coluna de seleção + código -->
        <ng-container matColumnDef="moduloCodigo">
          <th mat-header-cell *matHeaderCellDef>Código</th>
          <td mat-cell *matCellDef="let mod">
            <mat-checkbox [checked]="estaSelecionado(mod.codigo)" (change)="onToggleModulo(mod.codigo, $event.checked)">
              {{ mod.codigo }}
            </mat-checkbox>
          </td>
        </ng-container>

        <!-- coluna descrição -->
        <ng-container matColumnDef="moduloDescricao">
          <th mat-header-cell *matHeaderCellDef>Descrição</th>
          <td mat-cell *matCellDef="let mod">{{ mod.descricao }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay;"></tr>
      </table>
    </fieldset>
  </fieldset>
