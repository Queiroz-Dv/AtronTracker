<form [formGroup]="form" (ngSubmit)="salvar()" class="form-container-70">
  <c-salario-form [salarioForm]="form"></c-salario-form>
  <mat-card-actions>
    <button mat-raised-button type="submit" [disabled]="form.invalid">Salvar</button>
    <button mat-raised-button (click)="router.navigate(['atron/salarios'])">Voltar</button>
  </mat-card-actions>
</form>
