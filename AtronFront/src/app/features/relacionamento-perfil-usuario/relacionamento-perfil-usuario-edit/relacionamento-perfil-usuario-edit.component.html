<form [formGroup]="form" class="perfil-form container">
  <fieldset class="perfil-fieldset">
    <legend>Relacionamento de perfil com usuários</legend>
    <!-- SELECT de Perfis -->
    <mat-form-field appearance="fill" class="perfil-container">
      <mat-label>Selecione o perfil</mat-label>
      <input type="text" class="perfil-input" matInput formControlName="codigoPerfil" [matAutocomplete]="autoPrf" />
      <mat-autocomplete #autoPrf="matAutocomplete" [displayWith]="exibirPerfil">
        @for (prf of perfis; track prf.codigo) {
        <mat-option [value]="prf">{{ exibirPerfil(prf) }}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>

    <fieldset class="usuario-fieldset">
      <legend>Usuários</legend>
      <!-- TABELA de Usuários -->
      <table mat-table [dataSource]="datasource" matSort>

        <!-- coluna de seleção -->
        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef mat-sort-header="codigo">Código</th>
          <td mat-cell *matCellDef="let u">
            <mat-checkbox [checked]="estaSelecionado(u.codigo)" (change)="onToggleUsuario(u.codigo,$event.checked)">
              {{ u.codigo }}
            </mat-checkbox>
          </td>
        </ng-container>

        <!-- Nome -->
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef mat-sort-header="nome">Nome</th>
          <td mat-cell *matCellDef="let u">{{ u.nome }}</td>
        </ng-container>

        <!-- Sobrenome -->
        <ng-container matColumnDef="sobrenome">
          <th mat-header-cell *matHeaderCellDef mat-sort-header="sobrenome">Sobrenome</th>
          <td mat-cell *matCellDef="let u">{{ u.sobrenome }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let r; columns: displayedColumns"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Selecione a página de usuários">
      </mat-paginator>
    </fieldset>
    <!-- Ações -->

    <mat-card-actions class="m-10">
      <button mat-raised-button color="primary" (click)="salvar()" [disabled]="form.invalid"> Salvar </button>
      <c-botao-voltar></c-botao-voltar>
    </mat-card-actions>
  </fieldset>
</form>
